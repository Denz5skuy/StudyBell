<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - StudyBell!</title>

  <link rel="stylesheet" href="style.css">

  <!-- Font Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

  <!-- LEFT -->
  <div class="left-panel">

    <div class="logo">
      🔔 <span>StudyBell!</span>
    </div>

    <div class="left-content">
      <h1>Selamat Datang 👋</h1>

      <h2>Belajar jadi lebih teratur dan produktif.</h2>

      <p>
        Kelola tugas sekolah, jadwal belajar,
        dan deadline dengan mudah menggunakan StudyBell!
      </p>

      <img src="bell.png" alt="Study Illustration">
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right-panel">

    <div class="form-box">

      <h1>Masuk Akun</h1>

      <p class="subtitle">
        Login untuk melanjutkan belajar
      </p>

      <form id="loginForm">

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Masukkan email">
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Masukkan password">
        </div>

        <button type="submit" class="btn-login">
          Masuk Sekarang
        </button>

      </form>

      <p class="register-text">
        Belum punya akun?
        <a href="register.html">Daftar di sini</a>
      </p>

    </div>

  </div>

</div>

<script src="auth.js"></script>

</body>
</html>
