<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Register - StudyBell!</title>

  <link rel="stylesheet" href="style.css">

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left-panel">

    <div class="logo">
      🔔 <span>StudyBell!</span>
    </div>

    <div class="left-content">

      <h1>Buat Akun Baru ✨</h1>

      <h2>Mulai perjalanan belajarmu!</h2>

      <p>
        Daftar sekarang dan atur tugas,
        deadline, serta jadwal belajar
        dengan lebih mudah dan teratur.
      </p>

      <img src="bell.png" alt="Illustration">

    </div>

  </div>

  <!-- RIGHT -->
  <div class="right-panel">

    <div class="form-box">

      <h1>Daftar Akun</h1>

      <p class="subtitle">
        Isi data diri untuk membuat akun baru
      </p>

      <form id="registerForm">

        <div class="input-group">
          <label>Nama Lengkap</label>
          <input
            type="text"
            id="name"
            placeholder="Masukkan nama lengkap"
            required
          >
        </div>

        <div class="input-group">
          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="Masukkan email aktif"
            required
          >
        </div>

        <div class="input-group">
          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="Buat password"
            required
          >
        </div>

        <div class="input-group">
          <label>Konfirmasi Password</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="Konfirmasi password"
            required
          >
        </div>

        <button type="submit" class="btn-login">
          Daftar Sekarang
        </button>

      </form>

      <p class="register-text">
        Sudah punya akun?
        <a href="index.html">Masuk di sini</a>
      </p>

    </div>

  </div>

</div>

<script src="auth.js"></script>

</body>
</html>
